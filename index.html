<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do'stingni Sina</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --secondary-bg: #f8f9fa;
            --text-color: #2d3436;
            --border-radius: 16px;
            --primary-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            margin: 0; padding: 16px; box-sizing: border-box;
        }
        .container { max-width: 480px; margin: 0 auto; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-color); padding: 16px; border-radius: var(--border-radius);
            box-shadow: var(--primary-shadow); margin-bottom: 16px;
        }
        .header h1 { font-size: 20px; margin: 0; font-weight: 700; }
        .profile-btn {
            background: var(--secondary-bg); border: none; padding: 8px 12px;
            border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .card {
            background: var(--bg-color); border-radius: var(--border-radius);
            padding: 20px; box-shadow: var(--primary-shadow); margin-bottom: 12px;
            cursor: pointer; border: 1px solid rgba(0,0,0,0.03); transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .main-menu-btn {
            font-size: 16px; font-weight: 600; color: #2d3436; display: flex;
            justify-content: space-between; align-items: center;
        }
        .badge {
            background: #ff7675; color: white; border-radius: 50%;
            padding: 2px 8px; font-size: 12px; display: none;
        }
        .view { display: none; }
        .active-view { display: block; }
        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;
        }
        .btn-primary { background: #0088cc; color: white; }
        .option-input {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 1px solid #dfe6e9; margin-top: 8px; box-sizing: border-box;
        }
        .option-card {
            border: 2px solid #dfe6e9; border-radius: 12px; padding: 14px;
            margin: 8px 0; font-weight: 500; cursor: pointer; text-align: left;
            background: white; width: 100%; font-size: 15px;
        }
        .option-card.selected { border-color: #0088cc; background: #e8f4fd; }
        .nav-btns { display: flex; gap: 10px; margin-top: 15px; }
        
        /* Bildirishnoma Kartochkalari Ranglari */
        .res-card {
            border-radius: 12px; padding: 16px; margin-bottom: 10px;
            color: white; font-weight: 500; position: relative; overflow: hidden;
        }
        .res-perfect {
            background: #2ecc71;
            background-image: radial-gradient(rgba(255,255,255,0.15) 15%, transparent 16%), radial-gradient(rgba(255,255,255,0.15) 15%, transparent 16%);
            background-size: 16px 16px; background-position: 0 0, 8px 8px;
        }
        .res-good { background: #2ecc71; }
        .res-medium { background: #f1c40f; color: #2d3436; }
        .res-bad { background: #e74c3c; }
        
        .flex-row { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="container">

    <!-- HEADER (Barcha sahifalar uchun umumiy) -->
    <div class="header">
        <h1 id="header-title">Do'stingni sina</h1>
        <button class="profile-btn" onclick="showView('main-screen')">👤 Profil</button>
    </div>

    <!-- MAIN SCREEN -->
    <div id="main-screen" class="view active-view">
        <div class="card main-menu-btn" onclick="startTestTuzish()">
            <span>📋 Tayyor Test Tuzish</span> ➡️
        </div>
        <div class="card main-menu-btn" onclick="startTestYaratish()">
            <span>✍️ Yangi Test Yaratish</span> ➡️
        </div>
        <div class="card main-menu-btn" onclick="openNotifications()">
            <span>🔔 Bildirishnomalar</span>
            <span id="notif-badge" class="badge">0</span>
        </div>
    </div>

    <!-- QUIZ WIZARD (Tuzish va Yaratish uchun umumiy) -->
    <div id="quiz-wizard" class="view">
        <h3 id="wizard-question-num">Savol 1/11</h3>
        <div class="card">
            <input type="text" id="wizard-q-text" class="option-input" style="font-size:16px; font-weight:600;" placeholder="Savol matnini yozing...">
            <div id="wizard-options-container"></div>
            <div id="custom-option-block" style="margin-top:10px;">
                <input type="text" id="custom-option-input" class="option-input" placeholder="O'z variantingizni kiriting (Ixtiyoriy)">
                <button class="btn btn-primary" style="padding:8px; font-size:12px; margin-top:5px;" onclick="applyCustomOption()">Variantni almashtirish</button>
            </div>
        </div>
        <div class="nav-btns">
            <button class="btn" style="background:#b2bec3; color:white;" onclick="wizardPrev()">Avvalgi</button>
            <button class="btn btn-primary" onclick="wizardNext()">Keyingi</button>
        </div>
    </div>

    <!-- SHARE VIEW -->
    <div id="share-view" class="view">
        <div class="card" style="text-align: center;">
            <h2>🎉 Test Muvaffaqiyatli Yaratildi!</h2>
            <p>Endi ushbu testni do'stlaringizga ulashing va ulardan kim sizni yaxshiroq bilishini aniqlang!</p>
            <button class="btn btn-primary" id="share-tg-btn">Ulashish (Telegram)</button>
        </div>
    </div>

    <!-- NOTIFICATIONS VIEW -->
    <div id="notifications-view" class="view">
        <button class="btn" style="background:#b2bec3; color:white; margin-bottom:10px;" onclick="showView('main-screen')">⬅️ Orqaga</button>
        <h2>Yaqinda topshirganlar</h2>
        <div id="notif-list"></div>
    </div>

    <!-- RESULT DETAIL VIEW -->
    <div id="result-detail-view" class="view">
        <button class="btn" style="background:#b2bec3; color:white; margin-bottom:10px;" onclick="showView('notifications-view')">⬅️ Ro'yxatga qaytish</button>
        <h2>Tanlangan Javoblar Detallari</h2>
        <div id="detail-list"></div>
    </div>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const user = tg.initDataUnsafe?.user || { id: "123456", first_name: "Foydalanuvchi" };
    
    // Ssenariy ma'lumotlari
    let currentQuiz = { type: '', questions: [], currentIdx: 0 };
    let createdTestId = '';

    // Tayyor savollar bazasi (11 ta savol)
    const defaultQuestions = [
        { q: "Mening eng sevimli rangim qaysi?", options: ["Qora", "Oq", "Ko'k", "Qizil"], correct: 0 },
        { q: "Men qaysi mashinani ko'proq yoqtiraman?", options: ["Mercedes-Benz W124", "BMW M5", "Gentra", "Audi"], correct: 0 },
        { q: "Men bo'sh vaqtimda nima bilan shug'ullanaman?", options: ["Kod yozaman", "Gym / Sport", "O'yin o'ynayman", "Kino ko'raman"], correct: 1 },
        { q: "Yilning qaysi faslini afzal ko'raman?", options: ["Bahor", "Yoz", "Kuz", "Qish"], correct: 2 },
        { q: "Mening sevimli taomim qaysi?", options: ["Palov", "Shashlik", "Lag'mon", "Fast-food"], correct: 0 },
        { q: "Men ko'proq qaysi ichimlikni ichaman?", options: ["Choy", "Kofe", "Kola", "Oddiy suv"], correct: 3 },
        { q: "Men ko'proq qaysi janrdagi kinolarni ko'raman?", options: ["Detektiv", "Fantastika", "Komediya", "Dramatik"], correct: 1 },
        { q: "Qaysi xarakter menga ko'proq mos keladi?", options: ["Og'ir-bosiq", "Quvnoq", "Kamtarin", "Jiddiy"], correct: 0 },
        { q: "Tungi hayotmi yoki ertalabki?", options: ["Tungi odamman", "Ertalab uyg'onuvchi", "Farqi yo'q", "Doim uxlashni yoqtiraman"], correct: 0 },
        { q: "Men qayerda yashashni afzal ko'raman?", options: ["Tinch qishloqda", "Katta megapolisda", "Tabiat qo'ynida", "Chet elda"], correct: 1 },
        { q: "Men uchun eng muhimi nima?", options: ["Karyera", "Do'stlik / Oila", "Sayohatlar", "Boylik"], correct: 1 }
    ];

    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.getElementById(viewId).classList.add('active-view');
    }

    // "Test tuzish" ssenariysi
    function startTestTuzish() {
        currentQuiz.type = 'tuzish';
        currentQuiz.questions = JSON.parse(JSON.stringify(defaultQuestions)); // Deep clone
        currentQuiz.currentIdx = 0;
        document.getElementById('custom-option-block').style.display = 'block';
        document.getElementById('wizard-q-text').disabled = true;
        renderWizardQuestion();
        showView('quiz-wizard');
    }

    // "Test yaratish" ssenariysi
    function startTestYaratish() {
        currentQuiz.type = 'yaratish';
        currentQuiz.questions = Array.from({length: 11}, () => ({ q: '', options: ['', '', '', ''], correct: 0 }));
        currentQuiz.currentIdx = 0;
        document.getElementById('custom-option-block').style.display = 'none';
        document.getElementById('wizard-q-text').disabled = false;
        renderWizardQuestion();
        showView('quiz-wizard');
    }

    function renderWizardQuestion() {
        const idx = currentQuiz.currentIdx;
        const qData = currentQuiz.questions[idx];
        document.getElementById('wizard-question-num').innerText = `Savol ${idx + 1}/11`;
        document.getElementById('wizard-q-text').value = qData.q;

        const container = document.getElementById('wizard-options-container');
        container.innerHTML = '';

        qData.options.forEach((opt, oIdx) => {
            if(currentQuiz.type === 'tuzish') {
                const btn = document.createElement('button');
                btn.className = `option-card ${qData.correct === oIdx ? 'selected' : ''}`;
                btn.innerText = opt;
                btn.onclick = () => {
                    qData.correct = oIdx;
                    renderWizardQuestion();
                };
                container.appendChild(btn);
            } else {
                const inp = document.createElement('input');
                inp.className = 'option-input';
                inp.placeholder = `${oIdx + 1}-variantni kiriting`;
                inp.value = opt;
                inp.oninput = (e) => { qData.options[oIdx] = e.target.value; };
                
                const rb = document.createElement('input');
                rb.type = 'radio';
                rb.name = `correct-${idx}`;
                rb.checked = qData.correct === oIdx;
                rb.onchange = () => { qData.correct = oIdx; };

                const div = document.createElement('div');
                div.style.display = 'flex'; div.style.alignItems = 'center'; div.style.gap = '10px';
                div.appendChild(rb); div.appendChild(inp);
                container.appendChild(div);
            }
        });
    }

    function applyCustomOption() {
        const val = document.getElementById('custom-option-input').value.trim();
        if(!val) return;
        const idx = currentQuiz.currentIdx;
        // Oxirgi variantni olib tashlab, o'rniga foydalanuvchinikini qo'shish
        currentQuiz.questions[idx].options[3] = val;
        document.getElementById('custom-option-input').value = '';
        renderWizardQuestion();
    }

    function wizardPrev() {
        if(currentQuiz.currentIdx > 0) {
            currentQuiz.currentIdx--;
            renderWizardQuestion();
        }
    }

    async function wizardNext() {
        const idx = currentQuiz.currentIdx;
        const qData = currentQuiz.questions[idx];

        if(currentQuiz.type === 'yaratish') {
            qData.q = document.getElementById('wizard-q-text').value.trim();
            if(!qData.q || qData.options.some(o => !o.trim())) {
                alert("Iltimos, savol va barcha variantlarni to'ldiring!");
                return;
            }
        }

        if(currentQuiz.currentIdx < 10) {
            currentQuiz.currentIdx++;
            renderWizardQuestion();
        } else {
            // Test tayyor, serverga saqlash
            const payload = {
                creator_id: String(user.id),
                creator_name: user.first_name,
                type: currentQuiz.type,
                questions: currentQuiz.questions
            };

            const res = await fetch('/api/save_test', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).then(r => r.json());

            if(res.status === 'success') {
                createdTestId = res.test_id;
                showView('share-view');
                document.getElementById('share-tg-btn').onclick = () => {
                    const shareUrl = `https://t.me/share/url?url=https://t.me/SizningBotingiz?start=test_${createdTestId}&text=Men haqimda do'stlik testini topshirib ko'ring! Kim ko'proq ball olar ekan?`;
                    tg.openTelegramLink(shareUrl);
                };
            }
        }
    }

    // BILDIRISHNOMALAR VA NATIJALAR QISMI
    async function openNotifications() {
        showView('notifications-view');
        const listDiv = document.getElementById('notif-list');
        listDiv.innerHTML = 'Yuklanmoqda...';

        // Avval foydalanuvchining testlari bo'yicha bildirishnomalarni va natijalarni olish
        const notifs = await fetch(`/api/get_notifications/${user.id}`).then(r => r.json());
        listDiv.innerHTML = '';

        // Realtime db-dan kelgan natijalar obyektini massivga o'tkazish
        Object.keys(notifs).reverse().forEach(key => {
            const item = notifs[key];
            const mistakes = 11 - item.score;
            let cardClass = 'res-card ';

            // Shartli ranglar sxemasi va naqshlar
            if(mistakes === 0) cardClass += 'res-perfect';
            else if(mistakes <= 2) cardClass += 'res-good';
            else if(mistakes <= 5) cardClass += 'res-medium';
            else cardClass += 'res-bad';

            const card = document.createElement('div');
            card.className = cardClass;
            card.innerHTML = `
                <div class="flex-row">
                    <strong>👤 ${item.taker_name}</strong>
                    <span>📊 ${item.score}/11</span>
                </div>
                <div style="font-size:12px; margin-top:8px; opacity:0.9;">
                    🕒 Yakunlandi: ${item.timestamp}
                </div>
            `;
            // Kengaytirilgan tanlangan variantlarni ko'rish funksiyasi (ixtiyoriy bosilganda)
            card.onclick = () => openResultDetails(item);
            listDiv.innerHTML += card.outerHTML;
        });
    }

    function openResultDetails(item) {
        // Kartochka bosilganda qaysi variant tanlanganini ko'rsatish interfeysi
        showView('result-detail-view');
        const detList = document.getElementById('detail-list');
        detList.innerHTML = `<p>Do'stingiz <strong>${item.taker_name}</strong> barcha savollarga quyidagicha javob berdi.</p>`;
    }

    // Do'stlar test havolasi orqali kirganda (URL parametrlarni tekshirish)
    async function checkIncomingTest() {
        const urlParams = new URLSearchParams(window.location.search);
        const incomingTestId = urlParams.get('test_id');
        if(incomingTestId) {
            const testData = await fetch(`/api/get_test/${incomingTestId}`).then(r => r.json());
            if(testData) {
                // Do'st uchun testni boshlash oynasini generatsiya qilish dinamik ravishda shu yerda boshlanadi
                document.getElementById('header-title').innerText = `${testData.creator_name}ning testi`;
                // Bu yerda quiz-wizard rejimida test topshirish interfeysi ochiladi
            }
        }
    }
    
    // Unread bildirishnomalarni hisoblash va badge yangilash
    async function updateBadge() {
        const notifs = await fetch(`/api/get_notifications/${user.id}`).then(r => r.json());
        const unreadCount = Object.values(notifs).filter(n => n.status === 'unread').length;
        const badge = document.getElementById('notif-badge');
        if(unreadCount > 0) {
            badge.innerText = unreadCount;
            badge.style.display = 'inline-block';
        } else {
            badge.style.display = 'none';
        }
    }

    // Boshlang'ich tekshiruvlar
    checkIncomingTest();
    updateBadge();
</script>
</body>
</html>
